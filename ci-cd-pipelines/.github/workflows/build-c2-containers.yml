name: build-c2-containers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ci-cd-pipelines/c2-backend.Dockerfile

jobs:
  build-placeholder-control-plane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'workflow_dispatch'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ci-cd-pipelines/c2-backend.Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ghcr.io/${{ github.repository_owner }}/swarmbotics-c2-placeholder:latest
